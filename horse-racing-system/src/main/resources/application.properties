spring.application.name=horse-racing-system
server.port=9090

springdoc.api-docs.enabled=true
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html

spring.datasource.url=${EQUIX_DB_URL:jdbc:sqlserver://localhost:1433;databaseName=EquiX;encrypt=true;trustServerCertificate=true}
spring.datasource.username=${EQUIX_DB_USERNAME:equix_user}
spring.datasource.password=${EQUIX_DB_PASSWORD:123456}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.h2.console.enabled=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

app.jwt.secret=${EQUIX_JWT_SECRET:equix-local-development-jwt-secret-change-before-production}
app.jwt.expiration-ms=${EQUIX_JWT_EXPIRATION_MS:86400000}
app.frontend-base-url=${EQUIX_FRONTEND_BASE_URL:http://localhost:5173}
app.upload.avatar-dir=${EQUIX_AVATAR_DIR:uploads/avatars}
app.demo-data.enabled=${EQUIX_DEMO_DATA_ENABLED:false}
app.quick-login.enabled=${EQUIX_QUICK_LOGIN_ENABLED:true}

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
