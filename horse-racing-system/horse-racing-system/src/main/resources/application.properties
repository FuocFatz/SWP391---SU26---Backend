spring.application.name=horse-racing-system
spring.profiles.default=local
server.port=9090

springdoc.api-docs.enabled=true
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html

spring.datasource.url=${EQUIX_DB_URL:jdbc:sqlserver://localhost:1433;databaseName=EquiX;encrypt=true;trustServerCertificate=true}
spring.datasource.username=${EQUIX_DB_USERNAME}
spring.datasource.password=${EQUIX_DB_PASSWORD}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.h2.console.enabled=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# SQL Server dialect (CHỈ CẦN 1 CÁI NÀY)
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect

app.jwt.secret=${EQUIX_JWT_SECRET}
app.jwt.expiration-ms=${EQUIX_JWT_EXPIRATION_MS:86400000}
app.frontend-base-url=${EQUIX_FRONTEND_BASE_URL:http://localhost:5173}
