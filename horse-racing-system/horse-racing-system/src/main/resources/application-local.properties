# Local-only runtime configuration for the original EquiX SQL Server database.
# This file is ignored by Git so local credentials are never committed.
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=EquiX;encrypt=true;trustServerCertificate=true
spring.datasource.username=equix_user
spring.datasource.password=123456
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# The audited schema migrations have already been applied; validate prevents
# an accidental Hibernate schema rewrite of the existing database.
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect
spring.jpa.hibernate.ddl-auto=validate

# Required only for local JWT signing and intentionally kept out of Git.
app.jwt.secret=equix-local-development-jwt-secret-change-before-sharing

# Local demo accounts used by the frontend Quick Login panel. These accounts
# are isolated from real user emails and are recreated after a database reset.
app.demo-data.enabled=true
EQUIX_DEMO_ADMIN_EMAIL=demo-admin@equix.local
EQUIX_DEMO_ADMIN_PASSWORD=EquiXDemo!2026
EQUIX_DEMO_OWNER_EMAIL=demo-owner@equix.local
EQUIX_DEMO_OWNER_PASSWORD=EquiXDemo!2026
EQUIX_DEMO_JOCKEY_EMAIL=demo-jockey@equix.local
EQUIX_DEMO_JOCKEY_PASSWORD=EquiXDemo!2026
EQUIX_DEMO_REFEREE_EMAIL=demo-referee@equix.local
EQUIX_DEMO_REFEREE_PASSWORD=EquiXDemo!2026
EQUIX_DEMO_SPECTATOR_EMAIL=demo-spectator@equix.local
EQUIX_DEMO_SPECTATOR_PASSWORD=EquiXDemo!2026
