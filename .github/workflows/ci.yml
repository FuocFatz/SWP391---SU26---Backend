name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Run backend tests
        run: |
          chmod +x mvnw
          ./mvnw --batch-mode test

  frontend:
    name: Frontend quality checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: equix-frontend
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js 22
        uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: equix-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm test

      - name: Run lint
        run: npm run lint

      - name: Build production bundle
        run: npm run build
